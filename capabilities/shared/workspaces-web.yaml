naftiko: "1.0.0-alpha1"

info:
  label: "Amazon WorkSpaces Web API"
  description: "Programmatic access to WorkSpaces Web portals, user settings, browser settings, network settings, and trust store configurations."
  tags:
    - AWS
    - Secure Browser
    - End User Computing
    - Virtual Desktop
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: workspaces-web
      baseUri: https://workspaces-web.us-east-1.amazonaws.com
      description: "Amazon WorkSpaces Web REST API."
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: portals
          path: /portals
          description: "Manage web portals for secure browser access."
          operations:
            - name: list-portals
              method: GET
              description: "List WorkSpaces Web portals."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-portal
              method: POST
              description: "Create a new web portal."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  DisplayName: "{{tools.display_name}}"
        - name: portal-detail
          path: /portals/{portalArn}
          description: "Manage a specific portal."
          operations:
            - name: get-portal
              method: GET
              description: "Get portal details."
              inputParameters:
                - name: portalArn
                  in: path
                  type: string
                  required: true
                  description: "Portal ARN."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: user-settings
          path: /userSettings
          description: "Manage user settings for portals."
          operations:
            - name: list-user-settings
              method: GET
              description: "List user settings configurations."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: browser-settings
          path: /browserSettings
          description: "Manage browser policy settings."
          operations:
            - name: list-browser-settings
              method: GET
              description: "List browser settings configurations."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: network-settings
          path: /networkSettings
          description: "Manage network settings for portals."
          operations:
            - name: list-network-settings
              method: GET
              description: "List network settings configurations."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: trust-stores
          path: /trustStores
          description: "Manage trust stores for SSL certificate management."
          operations:
            - name: list-trust-stores
              method: GET
              description: "List trust stores."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: workspaces-web-rest
      resources:
        - path: /v1/portals
          name: portals
          description: "Portal management."
          operations:
            - method: GET
              name: list-portals
              description: "List portals."
              call: "workspaces-web.list-portals"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: workspaces-web-mcp
      transport: http
      tools:
        - name: list-portals
          description: "List WorkSpaces Web portals."
          hints:
            readOnly: true
            openWorld: true
          call: "workspaces-web.list-portals"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-portal
          description: "Create a new secure browser portal."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "workspaces-web.create-portal"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-user-settings
          description: "List user settings for portals."
          hints:
            readOnly: true
            openWorld: true
          call: "workspaces-web.list-user-settings"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-browser-settings
          description: "List browser policy settings."
          hints:
            readOnly: true
            openWorld: true
          call: "workspaces-web.list-browser-settings"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-network-settings
          description: "List network settings for portal connectivity."
          hints:
            readOnly: true
            openWorld: true
          call: "workspaces-web.list-network-settings"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-trust-stores
          description: "List SSL trust stores for secure browser sessions."
          hints:
            readOnly: true
            openWorld: true
          call: "workspaces-web.list-trust-stores"
          outputParameters:
            - type: object
              mapping: "$."
